front:
  text: 序石陽黃韞兮著脈確一書或從而叩其義韞兮曰醫憑乎脈而脈衰乎理從來醫家論脈不患其言之無理而患其言之於理甚精以之測病而所謂精者終未確也夫脈以測病不確豈能無誤浮游沉塞起伏傳變全寄之乎三指輕輒重按反復呼吸實有毫釐千里之判微乎渺乎確誠未易言矣碄於脈學究心已久嘗以軒岐之經為主而於諸賢論脈之書採其理之的然可信者而據以為確間有未的則證之於經復出己意以旁探博求其所謂確者第識見有限竊恐自以為確而終未必其能確也倘高明於其未確者更加校正則幸甚矣韞兮之言若此歲壬戌余以母病延之來淮出視是書山陽醫士李鑄九見之深為折服晚年其學益進余復攜其帙至真洲以示李喬年喬年亦世醫也謂余曰是書實足發蒙啟瞶先生既刊行傷寒論翼矣曷極付剞劂附之於後俾得表裡印證厥功豈不偉哉余曰諾因次述其語以弁簡端乾隆丙寅小春歙州程崟識附送戴原禮還浦陽序醫之為道至矣周官有疾醫視萬民四時之病春之痟首夏之癢疥秋之瘧寒冬之嗽咳分而治之驗其狀而制其祿復世官寢失職故於其術每擇之不精吾同縣戴原禮從朱先生彥修學治疾往往多奇驗原禮從叔仲章六月患大熱面赤口譫語身發紅斑他醫投以大承氣湯而熱愈極原禮脈之曰左右手皆浮虛無力非真熱也張子和云當解表而勿攻裡此證似之法當汗遂用附子乾薑人參白朮為劑烹液冷飲之大汗而愈櫧概方氏子婦瘧後多汗呼媵人易衣不至怒形於色遂昏厥若死狀灌以蘇合香丸而蘇自後聞人步之重雞犬之聲輒厥逆如初原禮曰脈虛甚重取則散是謂汗多亡陽正合經意以黃耆人參日補之其驚漸減至浹旬而安松江諸仲文長夏畏寒身常挾重纏食飲必熱如火方下咽微溫則嘔他醫授以胡椒煮伏雌之法日啖雞者三病逾亟原禮曰脈數而大且不弱劉守真云火極似水此之謂矣椒發陰經之火雞能助痰只以益其病爾以大承氣湯下之晝夜行二十餘頓減纊之半復以黃連導痰湯益竹瀝飲之竟瘳姑蘇朱子明之婦病長號數十聲暫止復如前人以為萬所憑莫能療原禮曰此郁病也痰閉於上火鬱於下故長號則氣少舒經云火鬱則發之是已遂用重劑湧之吐痰如膠者無算乃復初藥原忠妻因免乳後病驚身翩翩然如升浮雲之上舉目則室廬旋運持身弗定他醫飲以補虛治驚皆無驗原禮曰左脈雖芤且澀神色不動是因驚致心包絡積汙血爾法宜下之下積血如漆者一斗即愈留守衛吏陸仲容之內子病熱妄見神鬼手足瞤動他醫用黃連清心湯不中原禮視之曰形瘦而色不澤乃虛熱耳法當以李杲甘溫除大熱之法為治即經所謂損者溫之者也服人參黃耆而安他若此者甚眾夫醫之為道本於素問內經其學一壞於開元再壞於大觀習俗相仍絕不知究其微指唯執一定之方類刻舟而求劍者人訾之則曰我之用此不翅足矣又惡事內經為宋之錢仲陽獨得其秘於遺經而擴充之金之張劉李諸家又從而衍繹之於是內經之學大明劉之學朱先生得之最深大江以南醫之道本於內經實自先生髮之原禮乃其高弟弟子其傳授有要故察證無不中服其劑者沉疴豁然如洗昔司馬遷作倉公傳載其應詔所對自齊御史成至公乘項處凡二十有三書治病之狀甚具予仿此義稍陳原禮療疾奇中者系之首簡若周官疾醫四時治證之概知言者必有所擇焉贈醫師葛某序古之醫師必通於三世之書所謂三世者一曰針灸二曰神農本草三曰素女脈訣脈訣所以察證本草所以辨藥針灸所以祛疾非是三者不可以言醫故記禮者有云醫不三世不服其藥也傳經者既明載其說復斥其非而以父子相承三世為言何其惑歟夫醫之為道必志慮淵微機穎明發然後可與於斯雖其父不能必傳其子也吾鄉有某三世業醫專事大觀之方他皆弗之省又有朱聘君家世習儒至聘君始以醫鳴醫家諸書則無不精覽一少年病肺氣上喀喀鳴喉中急則唾唾血成縷某曰此瘵也後三月死聘君曰非也氣升而腴中失其樞火官司令爍金於爐是之謂肺痿治之生已而果然一六十翁患寒熱初毛灑淅齒擊下上熱繼之盛如蒸甑某曰此痰也不治將瘥聘君曰非也脈淫以芤數復亂息外強中乾禍作福極是之謂解亦藥之則瘳不藥則劇已而果劇治乃愈一女婦有噦疾每吐涎數升腥觸人人近亦噦某曰此寒噦也法宜溫聘君曰非也陽陰未平氣苞血聚其勢方格靡有攸處是之謂惡阻在法不當治久則自寧且生男言後輒驗夫某之醫三世矣聘君則始習為之而優劣若是醫其可以世論即昔之名醫眾矣若華元化張嗣伯許智藏其治證皆入神初不聞其父子相傳也自傳經惑於是非使禮經之意晦而不白三千年矣世之索醫者不問其通書與否見久於其業者則瞀瞀焉從之人問其故則曰是記禮者云爾也其可乎哉葛生某淮之鉅族也明於醫三世之書皆嘗習而通之出而治疾決死生驗瘥劇若燭照而龜卜無爽也者士或不能具藥輒注之不索其償士君子翕然稱之名上丞相府賜七品服俾提舉諸醫官有疾者遂倚之以為命嗚呼若葛生者其無愧古之醫師者歟贈醫師賈某序醫之為道難言矣必審診以起度量立規矩稱權衡合色脈表裡有餘不足順逆之法復參其人之動靜與其息之相應然後從而治之非洞明應世群書之得失不足與於斯黃帝內經雖疑先秦之士依仿而托之其言深其旨邃以弘其考辨信而有徵是當為醫家之宗下此則秦越人和緩無書可傳越人所著八十一難經則皆舉內經之要而推言者也又下此則淳于意華佗之熊經鴟顧固亦導引家之一術至於刳腹背湔腸胃而去疾則涉於神怪矣意之醫狀司馬遷備志之其所謂迴風杳風者今人絕不知為何證況復求於治療之深旨乎又下則張機機之金匱玉函經及傷寒諸論誠千古不刊之典第詳於六氣所傷而於情欲食飲罷勞之所致者略而弗議兼之文字錯簡亦未易以序次求之也又下此則王叔和叔和纂歧伯華佗等書為脈經敘陰陽內外辨三部九候分人寧氣和條陳十二經絡洎夫三焦五臟六腑之病最為著明惜乎為妄男子括以膚陋之脈歌遂使其本書不盛布於世也又下此則巢元方其病源候論似不為無見但言風寒二濕而不著濕熱之文乃其失也又下此則王砅砅推五運六氣之變撰為天元王策周詳切密亦人所難苟泥之則屬滯而不通矣又下此則王燾孫思邈思邈以絕人之識操慈仁惻厚之心其列千金方翼及工害人之禍至為憤切後人稍闖其藩垣亦足以其術鳴但不知傷寒之數或弗能無遺憾也熏雖闇劣外臺秘要所言方證符禁灼灸之詳頗有所祖述然謂針能殺生人而不能起死人者則一偏之見也又下此則錢乙龐安時許叔微叔微在準繩尺寸之中而無所發明安時雖能出奇應變而終未離於範圍二人皆得張機之粗者也惟乙深造機之閫奧而擷其精華建為五臟之方各隨所宜肝有相火則有瀉而無補腎為真水則有補而無瀉皆啟內經之秘世概以嬰孺醫目之何知乙之淺哉其遺書散之出於閻孝忠所集者多孝忠之意初非乙之本真也又下此則工谷張元素河間劉完素睢水張從正元素之與完素雖設為奇夢異人以神其授受實聞乙之風而起者若從正則又宗完素者也元素以古方新病決不能相值治疾一切不以方故其書亦不傳其存於今者皆後來之所傅會其學則東垣李杲深得之杲推明內外二傷而多注意於補脾土之說蓋以土為一身之主土平則諸臟平矣從正以吐汗下三法風寒暑濕火燥六門為醫之關鍵其治多攻其劑多峻厲不善學者殺人光素論風火之病以內經病機氣宜十九條著為元病式簡奧粹微有非大觀局諸醫所可彷彿究其設施則亦不越補攻二者之間也嗟乎自有內經以來醫書之藏有司者凡一百七十九家二百九部二千二百五十九卷他未遑深論即今所論者言之世之醫師果能盡心於斯否乎脫或未盡心於斯則夫起度量立規矩稱權衡合色脈之屬焉能察而行之不至以人命為戲也幾希矣雖然亦有要焉逆與順之謂也曰升降曰浮沉吾則順之曰溫涼曰寒熱吾則逆之果能此道矣則去夫先醫之所治雖不中不遠矣烏傷賈思誠濂外弟也嘗同濂師事城南聞先生學治經久之復受醫說於彥修宋先生治疾有奇驗薦紳間多為賦詩而屬濂以序濂為直疏歷世群書之得失而最思誠以學者如此
