body:
  text: 脈原氣口者手太陰肺經之動脈而五臟六腑之氣於此候之也蓋人以氣生營衛之氣先天也水穀之氣後天也先天后天之氣脈皆主之故飲入於胃其精氣自脾歸肺食入於腎其精氣自心歸肺肺布飲食之精氣於諸臟腑而後血氣充營衛調諸臟腑之氣各隨其經同營衛之氣而呼吸朝之於肺故手太陰肺經乃諸臟腑之氣所聚也聖人於氣口候其盛衰泄天地化育莫測之秘豈不神乎脈名王叔和脈經有浮芤洪涓數促弦緊沉伏革實微澀細耎弱虛散緩遲結代動二十四名叔和以後諸家又增長短牢疾大小共三十名按察病以脈必辨之精確而後見之明不至遊疑而無主據經之論脈不止三十名如鼓搏喘橫之類今亦未窺其奧不敢採入即三十名尚有可測者如脈經謂浮細為耎沉細為弱是耎以浮細辨弱以沉細辨也然經曰長夏胃微耎弱曰平使耎弱皆細脈細則氣少經何以謂為長夏之平脈乎又曰耎弱有石曰冬病石沉脈也耎弱而沉是水之侮土也使耎脈果以浮細辨經何謂以沉言乎由是觀之凡脈柔而無力者概謂之耎弱非浮細沉細之謂今以耎弱附於細以存其舊也仲景曰弦則為寒芤則為虛虛寒相搏此名曰革男子亡血失精女子半產漏下據此則革脈即芤之兼弦者芤主陰虛病革亦主陰虛病今以革附於芤也沉伏實大千金翼謂之牢主寒主痛是即沉脈而有力者今附於沉經一脈有數名者如秋脈謂之毛又謂之浮非二脈也是疾脈即數大即洪小即細也今刪耎弱革牢疾大小七名定為二十三脈蓋脈以候病其可去輒者不加詳辨則名目愈多脈理愈晦故不敢避僭妄之譏也脈類脈者陰陽之氣也有浮即有沉有大即有小有遲即有數故吳草廬滑伯仁李瀕湖皆以對待編之今欲其易於分別凡以浮辨者為一類以沉辨者為一類以浮沉合辨者為一類不以浮沉辨而以至數辨者為一類不以浮沉至數辨而以形辨者為一類寸關尺臟腑部位經尺內兩旁則季脅也肋骨盡處名季脅尺外以候腎尺內以候腹中附上越人謂之關左外以候肝內以候膈右外以候胃內以候脾上附上越人謂之寸口右外以候肺內以候胸中左外以候心內以候膻中膻中在兩乳之間前以候前後以候後上竟上者關以上胸喉中事也下竟下者關以下少腹腰股膝脛足中事也推而外之內而不外外浮也內沉也心腹疾也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頸項痛也按之至骨脈氣少者腰脊痛而有痹也脈經從魚際至高骨卻行一寸其中名曰寸口從寸至尺名曰尺澤故曰尺寸寸後尺前名曰關陽出陰入以關為界陽出三分陰入三分故曰三陽三陰陽生於尺動於寸陰生於寸動於尺寸主上焦頭及皮毛竟手關主中焦腹及腰尺主下焦少腹即足經於寸關尺分部以候五臟而六腑止及腎者蓋五臟先天之氣賴後天水穀之氣以養之也余腑不及者統於臟也蓋腎開竅於二陰小腸膀胱屬前陰大腸屬後陰則腎統乎大腸小腸膀胱也膽附於肝則肝統乎膽也三焦不統於臟故於寸內候胸中關內候膈尺內候腹胸中上焦也膈中焦也腹下焦也且五臟者身之主也外則耳目鼻口四肢皮毛肌肉內則筋骨脈絡氣血精神魂魄皆其所司也故人之一身皆可病而病入臟者死見真臟脈者死此所以經之論脈惟詳五臟也四時之脈有胃氣者生無胃氣者死此所以經之論脈而六腑止及胃也經論脈不以六腑配五臟而王叔和脈經以心與小腸候在左寸肺與大腸候在右寸肝膽候在左關脾胃候在右關腎與膀胱候在左尺又謂左尺屬腎右為子戶名曰三焦又謂腎與命門俱出尺部其書前後多自相矛盾疑不盡出於叔和世但闢高陽生脈訣而不知脈訣亦實本於脈經也至右尺主三焦命門之誤李瀕湖辨之詳矣經論脈不及腑腑病何以候之耶曰腑病辨之於症而以臟脈候內外之因假如頭角耳前後痛往來寒熱此膽經之病症也而肝脈浮緊則膽經之風寒肝脈弦數則膽經之痰火也假如胸中脹悶上焦之病症也而肺脈滑數則上焦之痰火肺脈沉遲則上焦之寒氣也寸關尺經有外候內候之說王太僕曰外謂外側內謂內側李士材曰外謂前半部內謂後半部二說皆有可議者試即尺論之外以候腎內以候腹假令腎病腹不痛而其脈外側見病脈內側見平脈乎前半部見病脈後半部見平脈乎即使如此而一指舉按之間所謂外側內側前半後半之界能劃然清乎今據經曰推而外之內而不外有心腹積也推而內之外而不內身有熱也外指浮內指沉沉而不浮故有心腹積浮而不沉故身有熱由是觀之則所謂外候內候指沉浮而言也明矣蓋五臟六腑之氣朝於脈口而各有所辨於寸關尺之間此天地生人神化莫測之妙聖人知其故而於寸關尺浮沉以候之浮陽也沉陰也以臟腑論則臟陰而腑陽以臟腑之氣論則臟氣清而腑氣濁清氣上升濁氣下降脈之見於寸關尺者五臟六腑之氣臟氣清故浮候之腑氣濁故沉候之也胃亦腑何為又浮以候之乎曰五臟皆稟氣於胃者也五臟之脈有胃氣者則平是五臟之清氣皆胃氣之所散布也脾受胃之清氣則胃為脾之主也故浮候胃而沉候脾也趙繼宗曰心肺居上為陽為浮肝腎居下為陰為沉脾居中州半陰半陽半浮半沉當以左寸為心右寸為肺左尺為肝右尺為腎兩關為脾按趙氏之說可謂妄矣夫寸關尺之部位皆手太陰肺經之動脈也聖人於此分候臟腑此其故惟聖人知之而其所以然之故聖人終不得明言之也趙氏不自知其量而創論欲異於聖人抑何妄乎至褚澄謂女人之脈當以左寸為命門左關為脾左尺為肺右寸為腎右關為肝右尺為心則其妄更甚矣脈經心肺俱浮然浮而大散者心也浮而短澀者肺也肝腎俱沉然牢而長者肝也按之耎舉指採實者腎也脾者中洲故其脈在中按此皆論心肺肝腎與脾之脈體非論寸關尺而凡浮者為心肺脈沉者為肝腎脈也王宗正不察為之說曰診脈之法當從心肺俱浮肝腎俱沉脾在中州之說王叔和獨守寸關尺分部位以測五臟六腑之脈非也按宗正以叔和獨守寸關尺為非不知執心肺俱浮肝腎俱沉之說亦非也今即守寸關尺論之假如氣虛痰鬱而兩寸俱沉之脈豈以其沉而遂謂肝腎之乘心肺乎失血傷精而關尺俱浮之脈豈以其浮而遂謂心肺之乘肝腎乎若使不守寸關尺將不論何部浮而皆以為心肺病乎不論何部沉而皆以為肝腎病乎況同一浮也心病肺不病不論部位其何以辨乎同一沉也肝病腎不病不論部位其何以辨乎且使心肺俱以浮候肝腎俱以沉候經何為又分心肺肝腎與脾胃之部乎夫脈以候病也守寸關尺以候之尚不能洞悉其精微若不守寸關尺則茫然而無據矣經曰脈者血氣之先血氣者陰陽也故脈有三部俱浮者陽盛也非三部之浮皆心肺脈也三部俱沉意陰盛也非三部之沉皆肝腎脈也當以部位辨之又以脈之本體辨之假如浮必浮洪來盛去衰者心也假如沉必沉而弦長者肝也經但言尺外以候腎尺內以候腹而叔和則以兩尺兼候膀胱吳寫皋李士材輩則以左尺兼候小腸與膀胱其意皆欲補經之所不及不知經之論脈惟詳五臟者蓋以五臟能繞乎六腑也即如傷寒頭痛腰痛項強此膀胱經之病症也而其脈不候於左尺而候於左寸愚故曰腑病辨之以症而以臟脈辨內外之因也由是觀之則以左尺候腎兼小腸與膀胱以為補經之所不及可以不必矣且一部候兩脈猶有浮沉陰陽之可辨至一部候腎與小腸陽膀胱至脈試問何以確辨其為腎脈為小腸脈為膀胱脈乎診法經診以平旦者陰氣未動陽氣未散飲食未進經脈未盛絡脈調均氣血未亂故乃可診有過之脈經人一呼脈自動一吸脈自動呼吸定息脈五動閏以太息命曰平人按一呼一吸為一息脈四動然呼吸之間必有一息長者謂之太息猶歲月之有閏故脈五動四動五動平脈也若三動則為不及六動則為太過皆病脈也難經曰呼出心與肺吸入腎與肝按呼吸之氣系衛氣吸非吸入乃吸起也蓋衛氣出下焦而主之於肺肺自下焦吸起而呼出於鼻一呼一吸衛氣流行晝夜循環周而復始故氣譬則火火之氣不通則不發人之氣不通則病呼之氣猶火之氣出而不入者也難經呼出心與肺吸入腎與肝之說似誤崔紫虛四言脈訣脈有七診曰浮中沉上下左右消息求尋按初持脈輕手於皮毛間候其表曰浮次稍重手於肌肉間候其半表半裡曰中次重手按至筋骨間候其里曰沉上謂上部下謂下部左謂左三部右謂右三部合為七診又經有七診謂獨大獨小獨疾獨遲獨寒獨熱獨陷下也四言脈訣又有九候舉按輕重按輕下指曰舉重下指曰按寸關尺每部有浮中沉三候合為九候又經有九候脈經曰九候者每部中有天地人也按經所謂天地人另指頭與手足三部之動脈不指寸關尺也經持脈有道虛靜為保內虛則心不紛外靜則心不擾春日浮如魚之遊在波浮非浮脈乃浮起也春日陽氣升其脈浮起然如魚之在波雖浮起而不甚浮也夏日在膚泛泛乎萬物有餘夏日陽氣盛萬物有餘故其脈浮大在膚秋日下膚蟄蟲將去秋日陽氣降蟄蟲將去故其脈漸沉而下膚冬日在骨蟄蟲周密君子居室冬日陽氣伏蟄蟲周密君子居室故其脈亦沉而在骨知內者按而紀之脈合內之臟腑其盛衰按脈而綱紀之是謂知內知外者終而始之四時陰陽之氣終而復始以脈之陰陽合四時之陰陽是謂知外此六者持脈之大道平脈經平人之常氣稟於胃胃者平人之常氣也春胃微弦曰平夏胃微鉤曰平長夏胃微耎弱曰平秋胃微毛曰平冬胃微石曰平按經所謂胃氣在微字上體認若弦則胃少弦甚則無胃惟微弦則其氣和故曰平余仿此經春脈如弦春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦反此者病夏脈如鉤夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病秋脈如浮秋脈者肺也西方金也萬物之所以收成也故氣來輕虛以浮來急去散故曰浮反此者病冬脈如營冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病營者內守之意脾者土也孤藏以灌四方者也善者不可得見惡者可見按脾脈之善者即胃氣四時見於弦鉤毛石之間故曰善者不可得見若脾胃受傷則惡者可見矣脈經春肝脈弦細而長曰平夏心脈浮大而散曰平長夏脈大阿阿而緩曰平秋肺脈浮澀而短曰平冬腎脈沉耎而滑曰平按脈經之說與經合參則脈理精且備矣凡脈不大不小不數不遲不滑不澀不短不長浮沉正等者平脈也凡病人脈不大不小浮沉正等而緩者為陰陽平病將愈也四言脈訣謂春弦夏鉤秋毛冬石為平脈不知弦鉤毛石有胃氣始為平脈若但弦但鉤但毛但石即病脈也滑伯仁診家樞要謂長夏四季脈遲緩為平本脈經脾胃部德則為緩恩則為遲之說不知一息四至閏以太息則五至此脾胃之平脈也三至為遲則主寒主虛病脈也朱丹溪曰男子寸盛尺弱女子尺盛寸弱按寸為陽男子陽盛故寸盛尺為陰女子陰盛故尺盛此男女尺寸之平脈也脈法贊左大順男右大順女按男子本氣旺血虛左主血左大於右是血足也血足則陽不至獨元矣女子本血旺氣虛右主氣右大於左是氣足也氣足則陰有所統攝矣且男子陽故左大女子陰故右大此男女左右之平脈也丹溪格致餘論以左右指醫者手之左右謂右大順男左大順女其說似牽強凡人肥脈沉人瘦脈浮人長脈長人短脈短人大脈大人小脈小順也反此則逆病脈五臟病脈扁鵲曰脈長而弦病出於肝脈大而洪病出於心脈下堅上虛病出於脾脈澀而浮病出於肺脈小而攣病出於腎四時病脈經春不沉夏不弦秋不數冬不澀是謂四塞如春水旺其脈弦然春初之時兼冬脈而沉弦則水生木母子之氣相通也若弦而不沉是不得母氣故曰塞塞則病矣參見曰病如春脈弦參見他脈則他臟之氣乘肝也未去而去曰病如春脈弦未交夏之時便不見弦而見鉤是肝氣不足未當去而即去也去而不去曰病如春脈弦入夏已深仍見弦不見鉤是肝氣有餘當去而不去也復見曰病如春脈弦或秋時復見弦脈是肝之乘肺也三部病脈脈經寸脈浮大而疾者名曰陽中之陽寸陽部也浮大疾陽脈也故曰陽中之陽病苦煩滿身熱頭痛腹中熱寸脈沉細者名曰陽中之陰沉細陰脈也見寸陽部故曰陽中之陰病苦悲傷不樂惡聞人聲少氣時汗出陰氣不通臂不能舉尺脈沉細者名曰陰中之陰病苦兩脛痠痛不能久立陰氣衰小便余澀陰下濕癢尺脈滑而浮大者名曰陰中之陽病若小腹痛滿不能溺溺即陰中痛大便亦然寸脈壯大尺中無有此為陽干陰其人若腰背痛陰中傷足脛寒尺脈牢而長關上無有此為陰乾陽其人若兩脛重少腹引臀痛上魚際病脈脈經脈入魚際者遺尿脈出魚際者逆氣喘息外內久新病脈經脈淺滑堅者病在外脈小實而堅者病在內脈小弱而澀者謂之久病脈浮滑而疾者謂之新病六病脈脈經弦緊滑澀浮沉此六脈為殘賊能為諸經作病主諸病脈外邪脈浮主風遲主寒緊主寒緩主濕細主濕沉主濕虛主暑內邪脈數主火洪主火實主火長主熱清主熱滑主痰主食弦主痰主食弦主痛緊主痛牢主痛短主痛促結主痛主久積澀主痛主痹動主痛主驚代主痛主泄實主脹緊主脹微主脹細主脹主吐伏主吐外邪兼見脈浮緊主風寒浮遲主風寒浮緩主風濕浮細主風濕沉遲主寒濕外邪內邪兼見脈浮洪主風火浮數主風火浮弦主風痰浮滑主風痰風熱浮長主風熱風癇遲滑主脹遲澀主瘕緊滑主吐緊澀主痹緩滑主熱中氣虛脈滑主氣虛代主氣虛沉無力主氣虛血虛脈澀主血虛芤主血虛洪主血虛浮無力主血虛氣血兩虛脈微主氣血兩虛竅主氣血兩虛虛主氣血兩虛細主氣血兩虛浮遲無力主氣血兩虛沉數無力主氣血兩虛可治病脈脈經凡脈浮大數勤長滑為陽沉微弦弱短澀為陰陽病見陰脈者過也陰病見陽脈者順也按脈之說本仲景傷寒論在傷寒症則陽病見陽脈者順陰病見陽脈者亦順若內傷病陰病見陽脈者又為逆也經曰陰病而陰脈大者為逆如虛勞失血之病喜沉細陰脈忌洪數陽脈是也脈經不辨誤經脈從陰陽病易已按男子陽左脈大為從女子陰右脈大為從春夏陽脈浮大為從秋冬陰脈沉細為從外感病陽症見陽脈為從陰症見陽脈亦為從內傷病陽症見陽脈為從陰症見陰脈亦為從四言脈訣脈貴有神李東垣曰脈之不病其神不言當自有也脈既病當求其中神之有無焉如六數七極熱也脈中有力即有神也三遲二敗寒也脈中有力即有神也熱有神當泄其熱則神在焉寒有神當去其寒則神在焉寒熱之脈無力無神將何藥而泄熱去寒乎按東垣以脈中有力為神固是也然所謂神者即胃氣也經曰脈弱以滑是有胃氣又曰滑則從澀則逆故五臟骨肉滑利可以長久以此與脈中有力合參則得之矣滑伯仁謂東垣脈中有力之中字乃浮中沉之中其意蓋謂脾居中州以中候有力為神然則沉脈者其神將何以候之乎伯仁誤矣諸可治病脈皆出扁鵲及叔和脈經其症未備者摘崔紫虛四言脈訣數條補之長病三部脈細而耎者生三部脈弦而數者生中惡腹大四肢滿脈大而緩者生脈緊細而微者生中風脈浮緩者生風病不仁痿蹶脈虛者生傷寒熱盛脈浮大者生已得汗脈沉小者生溫病三四日以下不得汗脈大疾者生譫言妄語身熱脈洪大者生癲病脈實堅者生脈搏大滑者久久自已癇病脈虛者生四肢厥逆脈沉細而長者生骨蒸勞熱脈數而虛者生咳嗽脈浮耎者生衄血脈小弱滑者生吐血脈滑者生小弱滑者生上氣喘息低昂脈滑手足溫者生嘔吐反胃脈沉滑者生消渴脈數大者生沉小者亦生消痹脈實大病久可治腹痛不得息脈細小遲者生積聚脈堅急強者生腹脹滿脈浮大者生水病脈浮大耎者生水病腹大如鼓脈實者生病泄脈緩時小結者生腸耎下白沫脈沉者生腸澼下膿血脈滑大者生腸澼下膿血脈沉小流連者生䘌蝕陰疘脈虛小者生婦人瘕聚脈弦急者生婦人漏下赤白不止脈小虛滑者生產後脈沉小滑者生金瘡出血脈沉小者生跌僕內有血腹脹滿脈堅強者生死脈真臟死脈經真肝脈至中外急如循刀刃責責然如按琴瑟弦真心脈至堅而搏如循薏苡子累累然真肺脈至大而虛如以毛羽中人膚真腎脈至搏而絕如指彈石辟辟然真脾脈至弱而乍數乍疏見真臟乃死何也五臟皆稟氣於胃胃者五臟之本也臟氣不能自至於手太陰因胃氣乃至於手太陰肺朝百脈故臟氣必先會於手太陰而後行於諸經也故經謂五臟各以其時自為而至於手太陰皆胃氣為之也五臟各以其時自為弦鉤毛石之象因胃氣而至於手太陰之脈口若邪氣勝者精氣衰胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死按五臟之氣為陰胃氣為陽五臟有胃氣則其脈和如微弦微鉤之類是也若無胃氣但見弦鉤等本臟之脈曰真臟見真臟則陽氣絕故死四時賊邪死脈經五邪所見春得秋脈夏得冬脈長夏得春脈冬得長夏脈名曰陰出之陽不治按所謂陰者真臟也故死脈經謂夏脈沉耎而滑者為腎乘心水剋火十死不治不知夏月停水停痰之人其脈有沉耎而滑者未必即為死病也且滑為陽脈沉耎而滑是有陽也有陽者亦不死也經所謂夏得冬脈乃沉而堅硬如指彈石純陰無陽者也又謂長夏脈弦細而長為肝乘脾木剋土十死不治不知長夏病瘧之人其脈多弦細而長者未必即為死病也且長為陽脈弦細而長是有陽也有陽者亦不死也經所謂長夏得春脈乃弦而堅硬如循刀刃純陰無陽者也脈經之說誤李士材曰一歲之中脈象不可再見如春宜弦而得洪脈者至夏必死得澀脈者至秋必死得沉脈者至冬必死為真臟之氣先泄也當其時不能再見矣按士材之說本脈經死脈要訣篇然亦有不可泥者經以春不沉謂之塞則春得沉脈未可即以為死脈也春脈弦未交夏之時便得鉤脈經謂未去而去者病亦未可即以為死脈也又當以病症合辨之庶幾始確且所謂真臟者純陰無陽之脈也非夏脈鉤或見於春時即為真臟也又當以有神無神細辨之庶幾始確大抵惟春得秋脈而澀者乃經所謂賊邪為不宜耳余仿此三部死脈脈經尺脈上不至關為陰絕寸脈下不至關為陽絕死不治上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無害所以然者如樹之有根也按上部無脈下部有脈若其脈微細如絲按之無有者此腎臟將盡未盡之氣也亦死形盛形瘕死脈經形盛脈細少氣不足以息者死形瘕脈大胸中多氣者死死脈名狀脈如屋漏雀啄者死屋漏者脈一來忽絕久又來也雀啄者脈來疾時絕又一來也脈來如彈石去如解索者死彈石者急而勁也解索者散乳無結也脈如魚翔蝦游者死魚翔蝦游者脈浮而無根也脈如湧泉者死湧泉者燥亂而有來無去也脈一息二至以下八至以上者死諸病死脈皆出扁鵲及叔和脈經其症未備者摘雀紫虛四言脈訣數條補之長病三部脈虛而澀者死實而大者亦死愚按急數者亦死中惡的緊大而浮者死中風脈堅大急病者死風病不仁痿蹶脈緊疾急者死傷寒熱盛脈沉小者死已得汗脈浮大者死溫病三四日以下不得汗脈細小者死譫語妄語四逆脈沉細微者死癲病脈小而堅急者死沉細者亦死癇病脈急實者死四肢厥逆脈反浮大而短者死頭痛脈短澀者死骨蒸勞熱脈澀小者死愚按脈洪數者亦死久嗽脈堅大者死脈沉緊者死咳且溲血脫形脈小勁者死愚按弦澀而數者亦死衄血不止脈大者死愚按血不止脈急數者亦死吐血脈實大者死脈緊強者死吐血而咳上氣其脈數有熱不得臥者死上氣脈數者死上氣喘息低昂脈澀四肢寒者死上氣面腫肩息脈大者死嘔吐反胃脈弦數緊澀者死消渴脈細小浮短者死消癉病久脈懸小堅急者死腹痛脈反浮大而長者死積聚脈虛弱者死沉小者死腹脹滿而喘脈反滑而沉者死脈虛小者亦死水病脈沉細虛微者死水病腹大如鼓脈虛者死病泄脈浮大數者死脈緊急者死腸澼下膿血脈浮大緊者死身熱脈懸絕及澀者死䘌蝕陰疘脈緊急者死婦人瘕聚脈虛弱者死婦人漏下赤白不止脈大緊實數者死產後脈實大緊弦急者死寸脈焱疾不謂者死金瘡出血脈浮大者死跌僕內有血腹脹滿脈小弱者死奇經奇經八脈亦候於手太陰肺經者也李瀕湖奇經八脈考極其詳悉然非神而明之莫能洞窺其奧曉然於指下也要之用針用炙則奇經之病必求奇經之穴以治之至於用藥則奇經之表裡寒熱虛實而臟腑之脈可以測之則亦可以統之也故茲編姑闕而不錄內經切脈之圖脈理作為歌便誦習也其以浮沉至數辨及不以浮沉至數辨者各從其類欲其易分別也浮沉等脈即用浮沉等字之韻欲其不混淆也脈之應病以內經為主內經未詳者以脈經補之脈經未詳者以歷代明醫之說補之欲其簡而訣也有是脈即有主是病之由復逐句箋釋於其下欲其明且暢也較前人脈賦脈詩頗有勝處有志醫學者由此入門雖曰捷徑實為正路矣脈以輕亂辨者曰浮輕手便得如木浮水上其以浮辨者曰洪浮大來有力去無力曰虛浮大按之無力曰芤浮大無力按之中央空兩邊實曰散浮大無力至數不齊渙漫不收曰微浮細無力按之如欲絕若有若無凡六脈浮內經謂之乏浮脈輕手得如木水中浮浮秋脈也春夏冬見之則病脈也然在秋輕虛以浮來急去散則為手脈若中央堅兩邊虛此謂太過細而微此謂不及亦病脈也有力表邪清涕嗽惡寒發熱令人愁風邪自皮毛入皮毛合肺肺開竅於鼻肺惡寒金寒則生水故鼻流清涕風邪迫肺則氣逆故嗽肺主衛風邪入則皮毛閉固衛氣不能溫外故惡寒肺與心皆在上肺邪傳心則心火鬱心主營營行血脈數一身發熱仲景謂冬月寒傷營則發熱惡寒無汗風傷齦則發熱惡風有汗此固然矣然四時感昌者亦發熱惡寒必用表藥而愈蓋表藥其味皆辛辛開毛孔散火鬱毛孔開則衛氣外達火鬱散則營血內安營衛調和則汗出而寒熱解矣寸主頭疼開腹滿尺司癃閉好推求自胸至頭寸主之諸陽經起於頭風邪自皮毛深入則歸經故頭痛肝脾與腎且脈常沉今脈浮乃陽之乘陰也陽盛則熱水之性寒則凋熱則旺肝水旺則克脾土脾虛則不欲食而腹滿腎竅於二陰真性惡燥熱勝則血燥而大腸不潤故閉氣燥而膀胱不化故癃癃者小便不利也浮緊傷寒浮虛暑寒傷營營行脈中寒氣動急故脈緊暑傷氣傷氣故脈虛浮緩風濕自宜搜濕氣濡滯故脈緩凡頭重身重腿膝痛浮腫大便泄小便黃者風溼症也浮滑風痰浮數熱滑主痰帶浮則為風痰數主熱帶浮則為風熱無力須將血弱謀陽盛故脈浮陰虛故無力遇此等脈不宜輕用表藥洪內經謂之鉤又謂之大應指雖浮大來盛去衰便曰洪洪夏脈也春秋冬見之則病脈也然就夏來盛去衰如鉤則為平脈若來盛去亦盛此為太過來不盛去反盛此為不及亦病脈也如鉤者浮候之來盛下垂由如鉤狀去衰則又柔和矣故為平脈真陰不足邪氣相攻人之正氣陰陽相配者也陰陽和則無病陰不足則陽盛陽盛則生火火者偏勝之氣也偏勝之氣為邪氣邪氣即邪火寸洪身熱兼膚痛咳唾煩心亦可窮陽盛故身熱火不得淺故膚痛火瀉肺故咳嘔心惡熱故煩嘔與脹察闕中胃喜清涼而惡熱嘔者火上炎也火鬱而不散也尺虛宜壯水泄痢不宜逢尺脈洪相火旺也宜壯水以制陽光若泄痢尺脈洪者難治李瀕湖謂洪脈非夏升陽散火宜愚按新病身強及洪見寸關者升陽數火可也若久病身弱及洪見兩尺者又宜以滋陰降火為是虛瀕湖引內經云氣來虛微為不及病在內愚按虛脈浮大無力微脈浮細無力火中不能見細則虛不可兼言微矣今考內經謂氣來不實而微為不及不實者細無力之謂也故可言微瀕湖硬以不實故作虛字誤虛來浮大耎無力夏宜逢之暑病居暑病發熱有汗脈虛者宜清暑益氣若陰熱惡寒無汗脈浮數而不虛者宜清暑解表寸虛自汗多驚悸虛脈主氣血虛正氣虛則邪氣實邪氣實便是火火食氣則表虛汗者心之液也血所化表既虛創營亦不固血隨火化外泄於表為自汗心藏神血虛則神失所養故多驚火氣衝心故跳動而多悸關主中宮脹不舒血虛肝鬱則脹脾胃虛中氣不足亦脹潮熱骨蒸痿候尺陽氣終巳陰氣始干陰虛則交午時陰分而陽氣並之陽勝則外越為肌膚熱內爍為骨髓熱熱在骨謂之骨蒸日如潮水之應時而至謂之潮熱骨枯髓竭足不任身謂足骨痿卻憐久病定亡軀芤革芤而弦曰革主陰虛失血與芤同今附於此脈經謂芤脈浮大而耎按之中央空兩邊實舊謂前後為兩邊者固非矣李士材以浮沉為兩邊亦不是有力謂之實浮中沉相去無幾豈有浮候實沉候實而中候獨見其空者乎據內經論浮脈云其氣來毛中央堅兩旁虛此謂太過由是推之則兩邊指兩旁也蓋芤脈浮大而耎按之兩旁浮實而中央獨陷下此血不充之象故主失血諸症輕手亂之浮大耎重按中空邊實芤芤草名中空如蔥血行脈中失血者其脈中空故以芤比之寸關吐衄腸癰病尺部崩淋便血流吐血衄血腸癰血崩血淋大便下血等症皆陽盛陰虛也摧陽故其脈浮大惟陰虛故其脈中空盛散有表無里大而散至數不齊楊花無定空中泛左寸怔忡右寸自汗散主氣實血虛心主血血虛則心神恍惚不寧曰怔忡氣實者邪氣實也邪氣實則熱熱則氣泄故自汗左關溫飲兮陰虛生內熱胃熱則津液耗而發渴渴多飲滲入肌膚會腸胃之外謂之滋飲右關食痹胳腫亦堪斷胃熱則不和不和則不消穀因而痞悶曰食痹胻足腫也胻明腎經下循脛外廉冒熱故胻腫尺為血大虛兩尺如斯終專算經以醫脈散為血少載同父曰腎脈散諸病脈代散皆不可治也微重乎按之如欲絕若有若無極其微微屬陰陽虛弱候惟陰陽皆虛故其脈見若有若無之象而名之曰微惡寒發熱汗霏霏陽虛則生寒陰虛則生熱陽不外固陰不內守則多汗寸微衄血驚兼喘關主中寒拘急泥氣血虛則中寒寒則心下拘急拘急不寬嬌也尺中厥逆元陽損陽火生於陰精陰精虛則陽火弱陽火弱則手足寒而為厥陰陽不交氣上衝而為逆也女子崩中帶下虧脈以重亂辨者曰沉重按始得其以沉辨者曰伏重按之著骨乃得凡二脈沉牢沉內經謂之石又謂之營牢牢即沉脈長大弦而有力者主寒主痛與沉同今附於此按始有則為沉沉冬脈也春夏秋見之則病脈也然在冬其氣來沉以搏則為平脈若來如彈石者此謂太過其去如數者此謂不及亦病脈也寸沉胸脅痛水氣膈間停若居關與尺腹背及腰疼沉主陰陰盛則克伐元氣故三部得沉者皆主痛宜溫之有水氣者宜利之沉緩寒濕沉數熱沉滑當知痰食真沉如無力氣虛甚明沉有力為實邪故主寒主積沉無力則氣虛也崔紫虛四言舉要云沉牢痼冷沉實熱極愚按牢脈沉而長大有力實脈沉臥亦長火有力同一沉臥長大有丸何以辨其為痼冷熱極手伏何以謂之伏推筋按至骨傷寒欲汗陽邪解厥逆臍疼溫藥服瀕湖曰傷寒一手伏曰單伏兩手伏曰雙伏不可以陽症見陰為診乃火邪內郁不得發越陽極似陰故脈伏必有大汗而解不可發表又有夾陰傷寒先有伏陰托內外復感寒陰盛陽衰四肢厥逆六脈俱伏須投姜附及炙關元脈乃復出若太谿衝陽皆無脈者必死寸司嘔吐關司痛尺部疝瘕利水穀霍亂嘔吐腹痛男子疝女子瘕聚痛甚者其脈多伏暴泄者脈亦多伏脈以浮沉合辨者曰實大而長浮沉皆得凡一脈實實脈大而長浮沉皆者力風熱蘊蓄深譫語發狂疾邪氣盛則實浮有力表實也沉有力理實也所以然者由風邪深入鬱而發熱熱甚則喪其神守故譫語更甚則發狂所謂重腸者狂也左手脈實者宜發之右手脈實腹滿者宜下之寸實嘔吐頻心胸苦氣逆積聚腹疼候在關大便不通候在尺瀕湖曰脈訣言尺實小便不禁與脈經尺實小腹痛小便癰之說何反潔古不知其謬藥用姜附愈謬矣愚按脈訣所言亦出脈經脈經云尺脈實小腹痛小便不禁宜服當歸湯加大黃一兩據用大黃則脈經以尺實為熱明矣潔古用姜附可謂大誤但虛寒不足之症火不能攝水則小便不禁此係實熱而脈經何以亦有小便不禁之言意者熱渴飲多大便閉塞水獨歸膀胱則小便數小便數則不及溺之即自出亦謂為小便不禁耶脈以至數辨者曰遲一息三至曰緩一息四至曰數一息六至曰結緩時一止曰促數時一至曰代止有常數遲入尺中良久方來凡六脈遲一息三至號之曰遲浮遲寒在表沉遲作里醫有力無力皆寒症抑陰扶陽不用疑寸遲心痛吐酸水寒氣攻心故痛胃虛而寒氣客之則水入於胃不輸於脾停於胃脘水得寒氣熏蒸變而為酸此為寒症故脈經治以附子湯茱萸湯然此症亦有熱者肝移熱於胃土受木製不能勝水水得木味蘊而淺酸經所謂諸嘔吐酸屬於熱是也當清熱燥濕此以脈之滑數辨之關尺寒疼厥可知陰氣盛則從足五指至膝上寒謂之寒厥遲澀癥結遲澀則血虛寒血虛寒則凝滯不行結成癥結遲滑脹宜滑主氣虛主食積氣虛則寒寒則氣收故脹寒飲食積於腸胃亦作脹緩緩脈均均來四至貴無偏勝耎而和緩主脾胃又主風濕在四季之月不大不小浮沉同等耎而和者手也若三部不齊則為偏勝或又兼他脈者病脈也不在四季之月他脈中帶緩者胃氣也若獨見極者病脈也肌肉不仁緩在寸風氣之傷人多在上寸部心肺也心主血脈肺主皮毛風邪入皮毛客血脈故肌肉之間不知痛癢曰不仁關知脾胃食難磨風氣通肝肝氣移之於脾胃脾胃實故不欲食實者邪實也尺為腳弱下身腫濕氣之傷人多在下濕濡筋故腳弱濕滲肌膚故下膻小便難而餘瀝多濕積下焦蘊而淺熱濕熱壅滯則膀胱之氣不化故小便難有餘瀝也浮緩為風沉緩濕若逢緩滑熱為疴經以緩而滑為熱中李士材以緩滑為濕痰誤緩澀管虛緩細痹風寒濕三氣皆能為痹風勝為行痹寒勝為痛痹濕勝為澀痹脈緩細者主風濕痹推詳三部自無訛數一息六至稍為數只有兒童獨安樂兒童以六至為平脈外此皆為火浮沉實數散且清浮數有力為實火在表宜散沉數有力為實火在裡宜清無力為虛宜補藥數而無力虛火也宜補氣或益火之元寸為喉舌疼嘔吐嗽煩渴胃口當心亦寸主之胃有火故嘔吐火迫肺故為嗽為煩肺金爆故渴關中補谷易於飢胃有大則消穀善飢尺部惡寒氣淋作脈經謂尺脈數惡寒小便黃赤又曰少陰脈數男子氣淋蓋腎為陰屬水陰虛而陽湊之內熱故外惡寒火伏水中故小便黃赤甚則膀胱之氣不化小便不利痛而為淋結脈經載扁鵲之言曰脈有表無里者死經名曰結何謂結脈在指下如麻子動搖按如麻子動搖者輕輒之則散亂無紀重按之則不可得故曰有表無里乃腎絕也與緩時一止之結不同緩時止謂之結陰盛陽衰凝氣血氣溫血行血者也氣虛不能溫血則血寒氣虛不能行血則血滯血寒而滯則結血結氣亦結矣浮為痛積外相攻沉為痛積內相迫促數時一止何其促陽有餘陰不足痰火煎熬或為喘嗽或斑毒內上紅紫盛凡者斑也黑斑難治癰疽皆毒也代動而中止不能還止有常數斯名代不是傷寒心悸多即有腹疼泄痢害久病固為凶扁鵲曰脈五來一止不復增減或七來一止不復增減者經名曰代死平人亦臟敗靈樞曰一日一疸五十營以營五臟之精所謂五十營者持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一髒髒無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者五臟無氣予之短期據脈經謂四十動一止四歲死三十動一止三歲死二十動一止二歲死十動一止歲內死五動一止五日死此亦概言之也不必泥女胎三月餘見之不為礙舊謂胎三月其脈代按胎脈有五月七月亦代者當於兩尺候之如胎來成九至或十至一止良久方來又九至或十至一止良久方來此所謂有常數也再來或九至或十至不止又於十二至或十五至一止但有常數皆是代脈代之止有常數乃信也土主信此脾胃之氣至也出為萬物之生氣脾胃乃五臟之生氣生氣至故有胎也且天一生水次生火木金土而五行備胎之初結乃天一之水也次生火木金土而五臟之氣全五臟之氣全故脈代也代又何以為死脈以生數論五臟之氣全應天五生土之數故其脈代以淺數論有形之後則營衛之氣與天地之書液周流而無一息之止者也五臟無氣獨胃氣尚在故其脈亦代然此胃氣乃油盡之燈故不久必死脈不以浮沉至數辨而以形辨者曰弦直而長如按弓弦曰緊往來有力左右彈人手如轉索無常曰長迢迢自若如揭長竿末稍曰短不能滿部兩頭縮縮曰細直而耎應指指如絲線曰澀細而往來難應指如輕刀刮竹曰滑往來前卻流利如珠曰動大如豆厥厥搖動凡八脈弦脈經謂弦脈舉之無有按瘧脈有浮弦者未嘗舉之無有也經曰瘧皆生於風惟旺於風故其脈浮弦且頭疼如破也即脈經傷寒條中亦有陽明中風脈弦浮之語則所謂弦脈舉之無有疑其誤也硬然在指下端直似弓弦弦春脈也夏秋冬見之則病脈也然在春耎弱而滑平脈也若而實強此謂太過不實而徵此謂不及亦病脈也夏秋則主瘧相纏風寒暑濕之氣皆為瘧其脈皆強惟夏秋患瘧者甚多冬春亦間有之弦數熱弦遲寒寸弦頭痛膈多痰弦主痰痰隨厥氣上升故頭痛關若癥瘕胃氣逆血凝氣滯久而堅硬在臍旁曰癥瘕胃中寒氣沖窗心下曰逆尺當㿗疝腳拘攣㿗疝者睪丸腫痛上遲小腹也蓋肝脈絡陰器主㿗疝或寒或澀或熱或虛或氣分或血分臨症以脈之遲數軟弱辨之肝主筋腎主骨筋束骨者也寒則筋急故抱攣拘攣痛屈伸不利也緊內經謂之急左右彈手其力強狀如轉索名為緊緊主寒浮緊表寒沉緊裡寒人迎主傷寒還把風癇診左手寸關之間曰人迎人迎緊主瀉寒頭痛惡寒發熱風氣通肝木得風則動搖故身瘛瘲肝火鼓動心火火炎神越故卒不知人吐涎沫曰風癇氣口主傷食喘嗽亦宜審右手寸關之間曰氣口氣口緊主傷食心下苦滿肺惡寒寒則氣逆故為喘與咳脈經曰緊為實以上皆實邪故其脈緊關尺見緊時痹疝極其准經謂青脈之至也長而右左彈人手有積氣在心下支胠名曰肝痹得之寒濕與疝同法長迢迢自若指間長倘帶搏堅便失常長脈在春乃肝脈也軟弱如揭長竿末稍曰肝平實而滑如循長竿曰肝病按長則氣治若應指搏堅而不耎弱則氣不治矣傷寒傳變陽明可評傷寒二三日脈長目痛鼻乾不得眠陽明病也左寸足疼舌捲縮經曰寸口脈長曰足脛痛按左寸心為陽主血脈長立有餘之病上余有則下不及血脈不通故足腫痛腎脈挾舌本舌為心病心火盛則水急水急則舌本縮而舌卷不能言矣右寸分明嘔血傷腎主唾其脈入肺中循喉嚨血隨火升故唾血關中少氣髀如折長本肝脈木邪剋土故脾虛中氣不足肢內曰髀胃脈之所下胃虛故脾痛如折又脾有邪其氣亦留於兩髀尺則腰痛不可當火盛則水衰腰為腎府腎空則腰痛短本位不能及縮縮其形短短則氣病若秋時肺脈短澀乃平脈也滑短酒傷浮短嗽寸主頭疼尺腹滿短主不及之病酒傷與嗽則氣不及也上不及則頭疼下不及則腹滿也細內經謂之小濡同耎弱脈經以浮細為耎沉細為弱豈細脈無浮二候獨於不浮不沉候之乎而內經何以有沉細之說也且經曰脈弱以滑是有胃氣滑者流利如深之謂若以沉細為弱則沉細如經之中不能見滑矣且脈經既以沉細為弱而論肺痿何以又有浮弱之言乎今據內經以弦脈耎弱為肝之平脈則所謂耎弱者無力之謂不得以浮細為耎沉細為弱矣況耎弱所主之病大概與細同今附於此直耎如絲細勞傷損血氣細主氣血兩虛身汗來心慌至浮細屬陰虛多盜汗沉細屬陽虛多自汗汗多心虛故慌寸須嘔吐關須脹脾胃虛寒上則嘔吐下則腹滿尺屬骨蒸痢與痹骨蒸久痢皆屬腎虛故脈細痹為寒濕之陰邪故脈亦細澀往來難細短澀輕刀刮竹形容切血少氣有餘寸澀心疼神亦怯胃屬陽明多血多氣其上口當心血虛則氣湊之氣血攻衝則當心而痛陽明又主驚驚氣歸心故神怯關中脅脹胃虛嘔肝藏血屬厥陰其脈布脅肋血少氣勝故脅肋脹胃為水穀之海血少則摻氣勝則逆爆則血枯逆則氣故不納水穀而嘔吐也尺部腸枯五心熱血虛則腸枯澀血虛而相火動則肝熱肝熱下移之於母則腎熱上移之於子則心熱腎之脈起於足心心之脈入於手心故手足心熱婦女當為經不通或為胎病宜區別血養胎故脈澀崔紫虛謂澀主自汗瀕湖士材皆宗之愚按內經云澀滿陽有餘也陽氣有餘則為身熱無汗當以經言為是滑流利如珠便是滑多汗陰有餘風痰更可察經曰滑者陰氣有餘也陰氣有餘為多汗身寒滑脈主風又主痰寸滑吞酸咳嗽嘔滑又主熱胃中濕氣與熱氣熏蒸蘊而淺酸停在胃脘故吞酸濕熱生痰故咳嗽及嘔吐當關積熱掌中發食積胃胃生熱胃熱上熏則包絡與心肺皆熱包絡之脈入掌中肺脈行其前心脈行其後故掌中就熱經所謂掌中熱者腹中熱是也痢疾㿉癃尺部者滑又主宿食食積成痢㿉者睪丸腫大痛連小腹也癃者小便不通脈經謂尺滑當溺血也女子或為經閉煞脈經謂尺脈滑女子經脈不利按滑為血有餘若滑而結及浮滑遲滑者蓄血也不然則是胎脈動仲景傷寒論曰數脈見於關上上下無頭尾如豆大厥厥搖動者名曰動愚按兩上字其一乃浚人誤添者當是數厥見於關上下經曰女子手少陰脈動甚者妊子也手少陰屬心是寸者動脈矣又曰陰虛陽搏謂之崩腎之陰虛陽搏之故見崩症是尺有動脈矣王叔和著脈經不知兩上字其一乃衍字因曰動脈見於關上遂令談之論脈者皆曰動脈只見於闕與經不合矣動脈如豆形數而厥厥動陽動出汗兮驚痛堪憂成無己曰陰陽相搏則虛者動按陰搏陽則陽虛陽虛故出汗經謂肝主驚陽明主驚按膽附於肝肝氣強者膽大肝氣弱者膽小膽小當有畏懼之心故易驚此驚之生於內者也陽明屬土土性靜故聞木聲惕然而驚此驚之生於外者也由是觀之則自驚者屬肝物觸而驚者屬陽明然而驚則皆歸於心也陰陽相搏陰邪勝故痛陰動發熱兮血崩為重陽搏陰則陰虛陰虛故發熱陽邪盛迫血妄行故崩胎脈尺脈滑疾心脈動來三部浮沉脈正等五十不止確為胎疾而按散兮其胎三月但疾不散兮五月可猜沉則為男浮則女陰陽推測貴三才女子以血旺為本尺脈當滑然滑屬血陰也痰屬氣陽也滑而疾是陽之交陰也女子心脈當沉今陰陽相搏而其脈動是陰之交陽也陰陽相交而三部之脈無偏浮偏沉五十不正無或結或促其為胎也明矣三月之胎其形未實故其脈按近而散五月之胎其形漸實故其脈按之不散而其疾如故者蠱疾為陽氣萬物得天地之陽氣以生成陰必得母之陽氣以長養也沉陰脈何以反為努浮陽脈何以反為女蓋男胎得陽氣多胎得陽氣多則母之陽不足陰有餘矣陰有餘陽不足故其脈沉女胎得陰氣多胎滑陰氣多則母之陰不足陽有餘矣陽有餘陰不足故其脈浮亦猶故為男陰多於陽且陰外而陽內也雖為女陽多於陰且陽外而陰內也疾與滑何以不主病蓋疾而不滑則為陰虛火盛滑而痰則非病矣尺既滑而疾則寸之動母非病矣脈經辨男女法左手沉實為男右手浮大為女左右手俱沉實生二男俱浮大生二女又左尺脈偏大為男右尺脈偏大為女左右俱大生二子
